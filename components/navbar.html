<header class="site-header">
  <nav class="container grid-12 nav" aria-label="Primary navigation">

    <!-- Brand logo -->
    <a class="brand" href="#home" aria-label="Simon Adhikari — back to top">
      <span class="brand__mark" aria-hidden="true">SA</span>
      <span>Simon Adhikari</span>
    </a>

    <!-- Desktop navigation links (shown at ≥ 1024px via CSS) -->
    <div class="nav__links" role="navigation" aria-label="Desktop navigation">
      <a href="#about">Profile</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Arsenal</a>
      <a href="#activity">Activity</a>
      <a href="#contact">Contact</a>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode" aria-pressed="false" style="grid-column: 11; justify-self: end; background: transparent; border: none; cursor: pointer; color: var(--color-ink); display: flex; align-items: center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <!-- Mobile hamburger toggle (hidden at ≥ 1024px via CSS) -->
    <button
      class="nav__toggle"
      type="button"
      aria-expanded="false"
      aria-controls="primary-menu"
      aria-label="Toggle navigation menu"
    >
      <span class="nav__toggle-icon" aria-hidden="true">
        <span class="nav__toggle-bar"></span>
        <span class="nav__toggle-bar"></span>
        <span class="nav__toggle-bar"></span>
      </span>
    </button>

    <!-- Mobile dropdown menu -->
    <ul class="nav__menu" id="primary-menu" role="list" aria-label="Mobile navigation" aria-hidden="true">
      <li><a href="#about">Profile</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#skills">Arsenal</a></li>

      <li><a href="#contact">Contact</a></li>
    </ul>

  </nav>
